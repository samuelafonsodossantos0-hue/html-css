<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.
    0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Paragrafos e quebras de linha</h1>
    <hr>
    <p>É possivel &lt;escrever&gt; um
       paragrafo de qualquer maneira
       batsa inserir o texto entre &lt;p&gt; e &lt;/p&gt;
       <!-- LESS THAN / GREATER THEN -->

    </p>
    <p>
        se eu precisar de fazer uma quebra do 
        texto num <br> determinado lugar, então temos
        que usar a tag br.
    </p>
    <p>Vamos adicionar alguns simbolos especiais:
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
    
    </p>
</body>
