<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1{
            background-color: darkgray;
            height: 300px;
            width: 300px;


            border: 10px solid darkslategray;
            padding: 10px 10px 10px 10px;

            margin-top:20px;
            margin-right:20px;
            margin-bottom:20px;
            margin-right:40px;

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
            
        }
        a{
             border-width: 10px;
            border-style: solid;
            border-color: red;
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;           
            
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">os links são exemplos de caixas inline-level</a>. Vamos ver como tudo funciona.</p>
</body>
</html>
