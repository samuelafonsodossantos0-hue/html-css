<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem Flexível</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: bold;
        }

        p {
            font-size: 18px;
            max-width: 700px;
        }

        img {
            width: 40vw;      /* A imagem ocupa 40% da largura da tela (igual ao exemplo) */
            height: auto;     /* Mantém a proporção */
            margin-top: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Imagem Flexível</h1>

    <p>
        Você está vendo a imagem completa? Experimente ampliar o tamanho da sua janela 
        para aproveitar a melhor experiência 😍
    </p>

    <img src="imagens" alt="imagens">

</body>
</html>


</body>
</html>
